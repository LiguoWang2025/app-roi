version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ad-roi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adroi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adroi_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ad_roi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adroi} -d ${POSTGRES_DB:-ad_roi}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    driver: local
